# @package _global_
module:
  _target_: emg2qwerty.lightning.CNNGRUCTCModule
  in_features: 528
  mlp_features: [384]
  num_electrode_channels: 16

  # CNN parameters
  cnn_channels: [512, 256, 256]
  cnn_kernel_size: 9

  # GRU parameters
  gru_hidden_size: 256
  gru_num_layers: 2
  dropout: 0.1

datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 8000  # 4 sec windows at 2 kHz EMG
  padding: [1800, 200]  # 900 ms past context, 100 ms future context
